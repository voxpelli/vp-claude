id: no-jsdoc-object-typedef
language: javascript
message: >-
  Redundant `{object}` on `@typedef {object} $NAME` — the `@property` tags
  below already define the shape. AUTO-FIXABLE: delete `{object} ` so it reads
  `@typedef $NAME` (apply this rule's `fix`, i.e. `ast-grep scan --update-all`).
severity: warning
rule:
  pattern: $COMMENT
  kind: comment
  regex: '@typedef\s+\{object\}'
transform:
  FIXED:
    replace:
      source: $COMMENT
      replace: '\{object\}\s*'
      by: ''
  NAME:
    replace:
      source: $COMMENT
      replace: '(?s)^.*?@typedef\s+\{object\}\s+(?<n>[A-Za-z0-9_$]+).*$'
      by: '$n'
fix: $FIXED
